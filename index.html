<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCMA Mock Exam 2026 | Complete Study Platform</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,700;9..144,800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2563eb;--primary-dark:#1e40af;--primary-light:#dbeafe;
  --success:#059669;--success-light:#d1fae5;
  --error:#dc2626;--error-light:#fee2e2;
  --warning:#d97706;--warning-light:#fef3c7;
  --purple:#7c3aed;--purple-light:#ede9fe;
  --bg:#f1f5f9;--card-bg:#ffffff;--text:#0f172a;--text-muted:#64748b;--border:#e2e8f0;
  --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
  --font-display:'Fraunces',serif;--font-body:'DM Sans',system-ui,sans-serif;
}
[data-theme=dark]{
  --primary:#60a5fa;--primary-dark:#3b82f6;--primary-light:#1e3a5f;
  --success:#34d399;--success-light:#064e3b;
  --error:#f87171;--error-light:#450a0a;
  --warning:#fbbf24;--warning-light:#451a03;
  --purple:#a78bfa;--purple-light:#2e1065;
  --bg:#0c1222;--card-bg:#1a2332;--text:#e2e8f0;--text-muted:#94a3b8;--border:#2d3a4a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;
  transition:background .3s,color .3s}
.container{max-width:960px;margin:0 auto;padding:20px 16px}

/* HEADER */
.header{background:linear-gradient(135deg,#1e3a8a 0%,#3b82f6 50%,#6366f1 100%);
  color:#fff;padding:28px 32px;border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(30,58,138,.3);margin-bottom:24px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;right:-20%;width:60%;height:200%;
  background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none}
.header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;position:relative}
.header h1{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.5px}
.header-subtitle{font-size:14px;opacity:.85;margin-top:2px;font-weight:300}
.header-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mode-toggle{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  color:#fff;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.mode-toggle:hover{background:rgba(255,255,255,.25)}
.mode-toggle.active{background:#fff;color:#1e3a8a;border-color:#fff}
.theme-toggle{background:rgba(255,255,255,.15);border:none;color:#fff;
  padding:7px 11px;border-radius:8px;cursor:pointer;font-size:17px;transition:all .2s}
.theme-toggle:hover{background:rgba(255,255,255,.25);transform:scale(1.1)}

/* EXAM NAV */
.exam-nav{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.exam-nav-btn{padding:9px 20px;border:2px solid var(--border);border-radius:10px;background:var(--card-bg);
  color:var(--text-muted);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;
  box-shadow:var(--shadow)}
.exam-nav-btn:hover{border-color:var(--primary);color:var(--text);transform:translateY(-1px)}
.exam-nav-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}

/* TABS */
.tabs{background:var(--card-bg);border-radius:var(--radius);padding:6px;margin-bottom:24px;
  display:flex;gap:4px;overflow-x:auto;box-shadow:var(--shadow)}
.tab{padding:10px 18px;border:none;background:0 0;color:var(--text-muted);
  font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;transition:all .2s;white-space:nowrap}
.tab:hover{background:var(--primary-light);color:var(--text)}
.tab.active{background:var(--primary);color:#fff}
.tab-content{display:none}.tab-content.active{display:block}

/* SECTION GRID */
.section-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.section-btn{padding:14px 8px;border:2px solid var(--border);border-radius:10px;background:var(--card-bg);
  cursor:pointer;transition:all .2s;text-align:center;box-shadow:var(--shadow)}
.section-btn:hover{border-color:var(--primary);transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(37,99,235,.15)}
.section-btn.active{border-color:var(--primary);background:var(--primary);color:#fff}
.section-btn.completed{border-color:var(--success);background:var(--success-light);color:var(--success)}
.section-title{font-size:13px;font-weight:700;margin-bottom:2px}
.section-range{font-size:11px;opacity:.7}.section-progress{font-size:11px;margin-top:3px;font-weight:600}

/* FILTER BAR */
.filter-bar{background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:var(--shadow)}
.filter-bar label{font-size:13px;font-weight:700;color:var(--text-muted)}
.filter-bar select{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--card-bg);color:var(--text);font-size:13px;cursor:pointer;font-family:var(--font-body)}
.filter-bar select:focus{outline:0;border-color:var(--primary)}
.spacer{flex:1}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body)}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.btn-primary{background:var(--primary);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--error);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* QUESTION CARD */
.question-card{background:var(--card-bg);border-radius:var(--radius);padding:22px;margin-bottom:14px;
  box-shadow:var(--shadow);transition:all .3s;border-left:4px solid transparent}
.question-card.correct{border-left-color:var(--success);background:linear-gradient(90deg,var(--success-light) 0%,var(--card-bg) 80px)}
.question-card.incorrect{border-left-color:var(--error);background:linear-gradient(90deg,var(--error-light) 0%,var(--card-bg) 80px)}
.question-card.flagged{border-right:4px solid var(--warning)}
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px}
.question-number{background:var(--primary-light);color:var(--primary);padding:3px 11px;
  border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.icon-btn{background:0 0;border:none;font-size:18px;cursor:pointer;padding:3px 7px;
  border-radius:6px;transition:all .2s;line-height:1}
.icon-btn:hover{background:var(--warning-light)}.icon-btn.active{color:var(--warning)}
.question-text{font-size:15px;line-height:1.65;margin-bottom:14px;font-weight:500}
.category-tag{display:inline-block;background:var(--purple-light);color:var(--purple);
  padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;margin-bottom:10px;letter-spacing:.3px}
.answer-select{width:100%;padding:11px 14px;font-size:14px;border:2px solid var(--border);
  border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;
  transition:all .2s;font-family:var(--font-body)}
.answer-select:hover{border-color:var(--primary)}
.answer-select:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.answer-select.correct{border-color:var(--success);background:var(--success-light)}
.answer-select.incorrect{border-color:var(--error);background:var(--error-light)}
.confidence-btns{display:flex;gap:6px;margin-top:10px}
.confidence-btn{flex:1;padding:7px;border:1.5px solid var(--border);background:var(--card-bg);
  border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font-body)}
.confidence-btn:hover{border-color:var(--primary)}.confidence-btn.selected{background:var(--primary);color:#fff;border-color:var(--primary)}
.feedback{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500}
.feedback.correct{background:var(--success-light);color:var(--success);border-left:3px solid var(--success)}
.feedback.incorrect{background:var(--error-light);color:var(--error);border-left:3px solid var(--error)}
.notes-toggle{margin-top:8px;font-size:12px;color:var(--text-muted);cursor:pointer;font-weight:600;
  background:none;border:none;font-family:var(--font-body)}
.notes-toggle:hover{color:var(--primary)}
.notes-area{margin-top:8px}
.notes-area textarea{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:6px;
  background:var(--card-bg);color:var(--text);font-family:var(--font-body);font-size:12px;
  resize:vertical;min-height:50px}
.notes-area textarea:focus{outline:0;border-color:var(--primary)}

/* SECTION NAV */
.section-nav{background:var(--card-bg);border-radius:var(--radius);padding:16px;margin-top:20px;
  box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:12px}
.section-info{font-size:13px;font-weight:600;color:var(--text-muted)}

/* DASHBOARD */
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);
  border-left:4px solid var(--primary)}
.stat-card.success{border-left-color:var(--success)}.stat-card.error{border-left-color:var(--error)}
.stat-card.warning{border-left-color:var(--warning)}.stat-card.purple{border-left-color:var(--purple)}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:800;color:var(--primary);display:block}
.stat-card.success .stat-value{color:var(--success)}.stat-card.error .stat-value{color:var(--error)}
.stat-card.warning .stat-value{color:var(--warning)}.stat-card.purple .stat-value{color:var(--purple)}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500;margin-top:2px}

/* ACHIEVEMENTS */
.panel{background:var(--card-bg);border-radius:var(--radius);padding:22px;margin-bottom:20px;box-shadow:var(--shadow)}
.panel h3{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:14px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.badge{text-align:center;padding:14px 8px;border-radius:10px;background:var(--bg);opacity:.45;transition:all .3s}
.badge.earned{opacity:1;background:linear-gradient(135deg,#fef3c7,#fcd34d);color:#78350f;
  transform:scale(1.05);box-shadow:0 4px 16px rgba(245,158,11,.25)}
.badge-icon{font-size:28px;margin-bottom:6px}.badge-name{font-size:11px;font-weight:700}

/* CATEGORY BARS */
.cat-item{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.cat-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-name{font-size:13px;font-weight:600}.cat-score{font-size:12px;color:var(--text-muted)}
.cat-bar-bg{background:var(--bg);height:7px;border-radius:4px;overflow:hidden}
.cat-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:4px;transition:width .4s}

/* TIMER */
.timer-display{position:fixed;top:16px;right:16px;background:var(--card-bg);padding:10px 18px;
  border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:16px;font-weight:700;z-index:1000;
  font-family:var(--font-display)}
.hidden{display:none!important}
@media print{.no-print{display:none!important}body{background:#fff;color:#000}
  .question-card{break-inside:avoid;border:1px solid #ccc;margin-bottom:16px;box-shadow:none}}
@media(max-width:768px){
  .section-grid{grid-template-columns:repeat(3,1fr)}
  .dashboard{grid-template-columns:repeat(2,1fr)}
  .header-content{flex-direction:column;align-items:flex-start}
  .tabs{overflow-x:scroll}.filter-bar{flex-direction:column;align-items:stretch}
  .section-nav{flex-direction:column}.btn{width:100%;justify-content:center}
  .timer-display{position:static;margin-bottom:12px;text-align:center}
}
</style>
</head>
<body>
<div class="container">
  <div class="header no-print">
    <div class="header-content">
      <div>
        <h1>🏥 CCMA Mock Exam 2026</h1>
        <div class="header-subtitle" id="hdr-subtitle">Complete Study Platform · 180 Questions</div>
      </div>
      <div class="header-controls">
        <button class="mode-toggle active" data-mode="study" id="mode-study">📖 Study</button>
        <button class="mode-toggle" data-mode="exam" id="mode-exam">✍️ Exam</button>
        <button class="theme-toggle" id="theme-btn">🌙</button>
      </div>
    </div>
  </div>

  <div class="exam-nav no-print" id="exam-nav"></div>

  <div class="tabs no-print" id="tabs">
    <button class="tab active" data-tab="quiz">📝 Quiz</button>
    <button class="tab" data-tab="dashboard">📊 Dashboard</button>
    <button class="tab" data-tab="review">🔍 Review</button>
    <button class="tab" data-tab="settings">⚙️ Settings</button>
  </div>

  <div class="timer-display no-print hidden" id="timer">⏱️ <span id="timer-val">00:00</span></div>
  <div class="no-print hidden" id="shuffle-badge" style="text-align:center;padding:4px 0;font-size:13px;color:var(--primary);font-weight:600">🔀 Questions shuffled</div>

  <!-- QUIZ -->
  <div class="tab-content active" id="tc-quiz">
    <div class="section-grid no-print" id="sec-grid"></div>
    <div class="filter-bar no-print" id="filter-bar">
      <label>Filter:</label>
      <select id="f-status">
        <option value="all">All Questions</option>
        <option value="unanswered">Unanswered</option>
        <option value="answered">Answered</option>
        <option value="flagged">🚩 Flagged</option>
        <option value="correct">✓ Correct</option>
        <option value="incorrect">✗ Incorrect</option>
      </select>
      <select id="f-cat"><option value="all">All Categories</option></select>
      <span class="spacer"></span>
      <button class="btn btn-secondary" id="btn-shuffle-quick">🔀 Shuffle</button>
      <button class="btn btn-success" id="btn-check">✓ Check Section</button>
      <button class="btn btn-secondary" id="btn-reset">↻ Reset</button>
    </div>
    <div id="quiz-cards"></div>
    <div class="section-nav no-print" id="sec-nav">
      <button class="btn btn-secondary" id="btn-prev">← Previous</button>
      <span class="section-info" id="sec-info"></span>
      <button class="btn btn-primary" id="btn-next">Next →</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="tab-content" id="tc-dashboard">
    <div class="dashboard" id="dash-stats"></div>
    <div class="panel"><h3>🏆 Achievements</h3><div class="badge-grid" id="badges"></div></div>
    <div class="panel"><h3>📊 Performance by Category</h3><div id="cat-breakdown"></div></div>
    <div class="panel"><h3>📈 Study Analytics</h3><div id="analytics"></div></div>
  </div>

  <!-- REVIEW -->
  <div class="tab-content" id="tc-review">
    <div class="filter-bar">
      <label>Review:</label>
      <select id="review-mode">
        <option value="incorrect">Incorrect Only</option>
        <option value="flagged">Flagged Only</option>
        <option value="low-confidence">Low Confidence</option>
      </select>
      <span class="spacer"></span>
      <button class="btn btn-primary" id="btn-review">Start Review</button>
    </div>
    <div id="review-cards"></div>
  </div>

  <!-- SETTINGS -->
  <div class="tab-content" id="tc-settings">
    <div class="panel">
      <h3>⚙️ Settings</h3>
      <div style="padding:8px 0">
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-autosave" checked> Auto-save progress
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-timer"> Show timer
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-confidence" checked> Show confidence rating
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-categories" checked> Show question categories
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-notes"> Show notes by default
        </label>
        <label style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:14px;cursor:pointer">
          <input type="checkbox" id="opt-shuffle"> Shuffle questions
        </label>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        <button class="btn btn-secondary" id="btn-export">📥 Export Progress</button>
        <button class="btn btn-secondary" id="btn-import">📤 Import Progress</button>
        <button class="btn btn-primary" id="btn-print">🖨️ Print Results</button>
        <button class="btn btn-danger" id="btn-clear">🗑️ Clear All Data</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CCMA Mock Exam 2026 — Complete Study Platform
   ============================================================ */
const _ALL_Q = [{"num": 1, "question": "In which of the following sections of a SOAP note should a medical assistant document a patient's social history?", "options": ["Plans", "Objective", "Assessment", "Subjective"], "answer": "Subjective", "category": "Medical Records & Documentation"}, {"num": 2, "question": "A medical assistant is caring for a patient who is terminally ill and has been crying uncontrollably as well as refusing to eat or see their family. The assistant should identify this as which of the following K\u00fcbler-Ross stages of grief?", "options": ["Anger", "Depression", "Denial", "Acceptance"], "answer": "Depression", "category": "General Medical Assisting"}, {"num": 3, "question": "medical assistant is performing an ear irrigation for an adult patient. Which of the following actions should the assistant take?", "options": ["Open the ear canal by pulling the pinna upward and backward.", "Open the ear canal by pulling the pinna downward and backward.", "Ask the patient to turn their head to the unaffected ear.", "Aim the fluid toward the bottom of the ear canal."], "answer": "Open the ear canal by pulling the pinna upward and backward.", "category": "General Medical Assisting"}, {"num": 4, "question": "Which of the following waste items should a medical assistant discard in a red biohazardous waste bag?", "options": ["Syringe and needle used for venipuncture", "Broken ampules", "Linens soiled with bodily fluids", "Used suture removal kit"], "answer": "Linens soiled with bodily fluids", "category": "Infection Control & Safety"}, {"num": 5, "question": "Which of the following techniques should a medical assistant use for the routine cleaning of EKG cables?", "options": ["Sanitization", "Soaking", "Disinfection", "Sterilization"], "answer": "Disinfection", "category": "EKG & Cardiac Procedures"}, {"num": 6, "question": "Which of the following is the purpose of monthly financial reconciliation?", "options": ["To ensure the financial records of the medical practice match the information provided on a bank statement", "To ensure patients are paying the medical practice in a timely manner", "To ensure all insurance claims are filed in a timely manner", "To ensure the practice does not get audited by the IRS"], "answer": "To ensure the financial records of the medical practice match the information provided on a bank statement", "category": "General Medical Assisting"}, {"num": 7, "question": "A medical assistant is preparing a patient who has anemia for an examination by the provider. Which of the following manifestations should the assistant expect?", "options": ["Abdominal pain", "Itchy skin", "Cloudy vision", "Irregular heartbeat"], "answer": "Irregular heartbeat", "category": "General Medical Assisting"}, {"num": 8, "question": "A medical assistant is measuring a patient's oxygen saturation with a pulse oximeter. Which of the following actions should the assistant take?", "options": ["Wash the site with soap and warm water.", "Report a reading of 97% to the provider.", "Instruct the patient to take several deep breaths while the sensor is in place.", "Check capillary refill in the patient's finger."], "answer": "Report a reading of 97% to the provider.", "category": "Vital Signs & Measurements"}, {"num": 9, "question": "A medical assistant is writing orders for an outpatient laparoscopic appendectomy. For this outpatient procedure, which of the following sets of procedural codes should the assistant use?", "options": ["CPT", "ICD-10-CM", "HCPCS", "ICD-10-PCS"], "answer": "CPT", "category": "Infection Control & Safety"}, {"num": 10, "question": "Which of the following preventative screening tests is recommended for a patient who is 45 years old?", "options": ["Lung cancer screening", "Dilated eye exam", "Electrocardiogram", "Bone density"], "answer": "Lung cancer screening", "category": "Diagnostic Testing & Screening"}, {"num": 11, "question": "A medical assistant is drawing five blood collection tubes. When should the assistant release the tourniquet?", "options": ["After a flash of blood is visible in the hub of the first tube", "Within 1 min of application", "After removing the needle", "Between 2 and 3 min after application"], "answer": "Within 1 min of application", "category": "Phlebotomy & Specimen Collection"}, {"num": 12, "question": "A medical assistant is performing a venipuncture procedure. According to order of draw, which of the following tubes should the assistant draw after the lavender tube?", "options": ["Red", "Gray", "Light blue", "Green"], "answer": "Gray", "category": "Phlebotomy & Specimen Collection"}, {"num": 13, "question": "Which of the following should occur after exposure to chemicals in the eyes?", "options": ["Flush the eyes for 15 min.", "Flush the eyes for 1 min.", "Flush the eyes for 3 min.", "Flush the eyes for 5 min."], "answer": "Flush the eyes for 15 min.", "category": "General Medical Assisting"}, {"num": 14, "question": "A medical assistant should complete documentation in a patient's medical record at which of the following times?", "options": ["Prior to a procedure", "Immediately following a procedure", "During a procedure", "After completing all procedures for the day"], "answer": "Immediately following a procedure", "category": "Medical Records & Documentation"}, {"num": 15, "question": "Which of the following procedures should a medical assistant perform on a soiled hemostat prior to autoclaving?", "options": ["Antiseptic procedure", "Disinfection", "Sterilization", "Sanitization"], "answer": "Sanitization", "category": "General Medical Assisting"}, {"num": 16, "question": "According to the CDC, which of the following is the minimum length of time recommended for using medical aseptic handwashing after using the restroom, before and after eating, or after seeing patients?", "options": ["Washing for at least 20 seconds", "Washing for at least 60 seconds", "Washing for at least 30 seconds", "Washing for at least 45 seconds"], "ans // Strip hidden zero-width spaces from option strings so answer comparisons work
_ALL_Q.forEach(q => { q.options = q.options.map(o => o.replace(/​/g, '')); });
// Q34: answer text didn't match the option wording — align to option[0]
_ALL_Q[33].answer = _ALL_Q[33].options[0];

// Mock-exam mode — driven by ?mock=1 or ?mock=2 URL param
const _mock = new URLSearchParams(location.search).get('mock');
let Q        = _mock === '1' ? _ALL_Q.slice(0, 90) : _mock === '2' ? _ALL_Q.slice(90) : _ALL_Q;
const BASE_Q = Q.slice();
const NUM_SEC = Q.length <= 90 ? 3 : 6;
const TOTAL   = Q.length;
const MOCK_KEY = 'ccma2026' + (_mock ? '-mock' + _mock : '');
const MOCK_LABEL = _mock === '1' ? 'Mock Exam 1 · Q1–90'
                 : _mock === '2' ? 'Mock Exam 2 · Q91–180'
                 : 'Full Exam · 180 Questions';
const PER_SEC = 30;

// ---- STATE ----
let S = {
  mode:'study', sec:0,
  shuffled: false,
  shuffleOrder: [],
  ans_study: Array(TOTAL).fill(''),
  chk_study: Array(TOTAL).fill(false),
  ans_exam:  Array(TOTAL).fill(''),
  chk_exam:  Array(TOTAL).fill(false),
  flag:  Array(TOTAL).fill(false),
  notes: Array(TOTAL).fill(''),
  conf:  Array(TOTAL).fill(''),
  t0: null, elapsed: 0
};
S.ans = S.ans_study;
S.chk = S.chk_study;
let timerInterval = null;
function syncAliases(){
  S.ans = S.mode==='study' ? S.ans_study : S.ans_exam;
  S.chk = S.mode==='study' ? S.chk_study : S.chk_exam;
}
function applyShuffleOrder(){
  if(S.shuffled && S.shuffleOrder.length===BASE_Q.length){
    Q = S.shuffleOrder.map(i => BASE_Q[i]);
  } else {
    Q = BASE_Q.slice();
  }
}

// ---- PERSISTENCE ----
function save(){
  if(!el('opt-autosave')?.checked) return;
  try{ const {ans,chk,...toSave}=S; localStorage.setItem(MOCK_KEY,JSON.stringify(toSave)) }catch(e){}
}
function load(){
  try{
    const d=localStorage.getItem(MOCK_KEY);
    if(d){
      const p=JSON.parse(d); Object.assign(S,p);
      if(!p.ans_study && p.ans){
        S.ans_study=p.ans.slice(); S.chk_study=p.chk?p.chk.slice():Array(TOTAL).fill(false);
        S.ans_exam=Array(TOTAL).fill(''); S.chk_exam=Array(TOTAL).fill(false);
      }
    }
  }catch(e){}
  syncAliases();
  applyShuffleOrder();
}
function el(id){return document.getElementById(id)}

// ---- SECTIONS ----
function secGrid(){
  const g=el('sec-grid'); if(!g) return; g.innerHTML='';
  for(let i=0;i<NUM_SEC;i++){
    const s=i*PER_SEC, e=(i+1)*PER_SEC;
    const ans=S.ans.slice(s,e).filter(a=>a!=='').length;
    const b=document.createElement('div');
    b.className='section-btn'+(i===S.sec?' active':'')+(ans===PER_SEC?' completed':'');
    const qFirst=Q[s].num, qLast=Q[Math.min(e,Q.length)-1].num;
    b.innerHTML=`<div class="section-title">Section ${i+1}</div><div class="section-range">Q${qFirst}–${qLast}</div><div class="section-progress">${ans}/${PER_SEC}</div>`;
    b.onclick=()=>{S.sec=i;save();render()};
    g.appendChild(b);
  }
}

// ---- RENDER QUIZ ----
function render(){
  secGrid(); renderCards(); secNav();
}

function renderCards(){
  const c=el('quiz-cards'); if(!c) return; c.innerHTML='';
  const filt=el('f-status')?.value||'all';
  const fcat=el('f-cat')?.value||'all';
  const start=S.sec*PER_SEC, end=(S.sec+1)*PER_SEC;
  let shown=0;
  
  for(let idx=start;idx<end;idx++){
    const q=Q[idx];
    const isAns=S.ans[idx]!=='', isFlg=S.flag[idx];
    const isCor=S.chk[idx]&&S.ans[idx]===q.answer;
    const isInc=S.chk[idx]&&S.ans[idx]!==q.answer;
    
    if(filt==='unanswered'&&isAns) continue;
    if(filt==='answered'&&!isAns) continue;
    if(filt==='flagged'&&!isFlg) continue;
    if(filt==='correct'&&!isCor) continue;
    if(filt==='incorrect'&&!isInc) continue;
    if(fcat!=='all'&&q.category!==fcat) continue;
    
    c.appendChild(makeCard(q,idx));
    shown++;
  }
  if(shown===0) c.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">No questions match this filter in the current section.</div>';
}

function makeCard(q,idx){
  const d=document.createElement('div');
  d.className='question-card';
  const isAns=S.ans[idx]!=='';
  const isCor=S.chk[idx]&&S.ans[idx]===q.answer;
  const isInc=S.chk[idx]&&S.ans[idx]!==q.answer;
  const study=S.mode==='study';
  const showStudyFb=study&&isAns;
  
  if(isCor||(showStudyFb&&S.ans[idx]===q.answer)) d.classList.add('correct');
  if(isInc||(showStudyFb&&S.ans[idx]!==q.answer)) d.classList.add('incorrect');
  if(S.flag[idx]) d.classList.add('flagged');
  
  const showCat=el('opt-categories')?.checked!==false;
  const showConf=el('opt-confidence')?.checked!==false;
  const showNotes=el('opt-notes')?.checked===true;
  
  let h=`<div class="question-header"><span class="question-number">Question ${q.num}</span>
    <button class="icon-btn${S.flag[idx]?' active':''}" data-act="flag" data-i="${idx}" title="Flag for review">${S.flag[idx]?'🚩':'⚐'}</button></div>`;
  if(showCat) h+=`<div class="category-tag">${q.category}</div>`;
  h+=`<div class="question-text">${q.question}</div>`;
  
  // Build select with escaped options
  h+=`<select class="answer-select${isCor?' correct':''}${isInc?' incorrect':''}" data-act="answer" data-i="${idx}"${S.chk[idx]&&!study?' disabled':''}>`;
  h+=`<option value="">— Select an answer —</option>`;
  for(const opt of q.options){
    h+=`<option value="${opt}"${S.ans[idx]===opt?' selected':''}>${opt}</option>`;
  }
  h+=`</select>`;
  
  // Confidence
  if(showConf&&isAns){
    h+=`<div class="confidence-btns">
      <button class="confidence-btn${S.conf[idx]==='low'?' selected':''}" data-act="conf" data-i="${idx}" data-lv="low">😰 Unsure</button>
      <button class="confidence-btn${S.conf[idx]==='medium'?' selected':''}" data-act="conf" data-i="${idx}" data-lv="medium">🤔 Maybe</button>
      <button class="confidence-btn${S.conf[idx]==='high'?' selected':''}" data-act="conf" data-i="${idx}" data-lv="high">😊 Sure</button>
    </div>`;
  }
  
  // Feedback
  if(S.chk[idx]||showStudyFb){
    const correct=S.ans[idx]===q.answer;
    h+=`<div class="feedback ${correct?'correct':'incorrect'}"><strong>${correct?'✓ Correct!':'✗ Incorrect'}</strong>${!correct?` — Correct answer: ${q.answer}`:''}</div>`;
  }
  
  // Notes
  const hasNote=S.notes[idx]!=='';
  h+=`<button class="notes-toggle" data-act="togglenote" data-i="${idx}">${hasNote?'📝 Edit note':'📝 Add note'}</button>`;
  h+=`<div class="notes-area${showNotes||hasNote?'':' hidden'}" id="note-${idx}"><textarea data-act="note" data-i="${idx}" placeholder="Type your notes here…">${S.notes[idx]}</textarea></div>`;
  
  d.innerHTML=h;
  return d;
}

// ---- SECTION NAV ----
function secNav(){
  const info=el('sec-info');
  const start=S.sec*PER_SEC+1, end=(S.sec+1)*PER_SEC;
  const ans=S.ans.slice(S.sec*PER_SEC,(S.sec+1)*PER_SEC).filter(a=>a!=='').length;
  if(info) info.textContent=`Section ${S.sec+1} of ${NUM_SEC} · ${ans}/${PER_SEC} answered`;
  el('btn-prev').disabled=S.sec===0;
  const isLast=S.sec===NUM_SEC-1;
  el('btn-next').textContent=isLast?'🎉 Finish Quiz':'Next →';
}

// ---- DASHBOARD ----
function updateDash(){
  const ans=S.ans.filter(a=>a!=='').length;
  const checked=S.chk.filter(c=>c).length;
  const cor=S.ans.filter((a,i)=>S.chk[i]&&a===Q[i].answer).length;
  const inc=S.ans.filter((a,i)=>S.chk[i]&&a!==Q[i].answer).length;
  const flg=S.flag.filter(f=>f).length;
  const acc=checked>0?Math.round(cor/checked*100):0;
  
  const ds=el('dash-stats');
  if(ds) ds.innerHTML=`
    <div class="stat-card"><span class="stat-value">${ans}/${TOTAL}</span><div class="stat-label">Answered</div></div>
    <div class="stat-card success"><span class="stat-value">${cor}</span><div class="stat-label">Correct</div></div>
    <div class="stat-card error"><span class="stat-value">${inc}</span><div class="stat-label">Incorrect</div></div>
    <div class="stat-card warning"><span class="stat-value">${flg}</span><div class="stat-label">Flagged</div></div>
    <div class="stat-card purple"><span class="stat-value">${acc}%</span><div class="stat-label">Accuracy</div></div>`;
  
  // Categories
  const cats={};
  Q.forEach((q,i)=>{
    if(!cats[q.category]) cats[q.category]={t:0,a:0,c:0,chked:0};
    cats[q.category].t++;
    if(S.ans[i]!==''){
      cats[q.category].a++;
      if(S.chk[i]){
        cats[q.category].chked++;
        if(S.ans[i]===q.answer) cats[q.category].c++;
      }
    }
  });
  const cb=el('cat-breakdown');
  if(cb){cb.innerHTML='';
    Object.entries(cats).sort((a,b)=>b[1].t-a[1].t).forEach(([cat,s])=>{
      const pct=s.chked>0?Math.round(s.c/s.chked*100):0;
      const barColor=pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--error)';
      cb.innerHTML+=`<div class="cat-item"><div class="cat-header"><span class="cat-name">${cat} <span style="font-weight:400;color:var(--text-muted);font-size:12px">(${s.t} questions)</span></span><span class="cat-score">${s.c}/${s.chked} correct${s.chked>0?' · '+pct+'%':''}</span></div><div class="cat-bar-bg"><div class="cat-bar" style="width:${pct}%;background:${barColor}"></div></div></div>`;
    });
  }
  
  // Analytics
  const an=el('analytics');
  if(an){
    const fmt=s=>{const m=Math.floor(s/60),ss=s%60;return`${m}:${ss.toString().padStart(2,'0')}`};
    const lc=S.conf.filter(c=>c==='low').length, mc=S.conf.filter(c=>c==='medium').length, hc=S.conf.filter(c=>c==='high').length;
    an.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div><p><strong>Time Studied:</strong> ${fmt(S.elapsed)}</p><p><strong>Questions Flagged:</strong> ${flg}</p><p><strong>Notes Added:</strong> ${S.notes.filter(n=>n!=='').length}</p></div>
      <div><p><strong>😰 Low Confidence:</strong> ${lc}</p><p><strong>🤔 Medium:</strong> ${mc}</p><p><strong>😊 High:</strong> ${hc}</p></div>
    </div>`;
  }
  
  // Badges
  const badges=[
    {n:'First Step',i:'🎯',e:()=>S.ans.some(a=>a!=='')},
    {n:'Section Pro',i:'📚',e:()=>{for(let i=0;i<NUM_SEC;i++){if(S.ans.slice(i*PER_SEC,(i+1)*PER_SEC).every(a=>a!==''))return true}return false}},
    {n:'Halfway',i:'🌟',e:()=>S.ans.filter(a=>a!=='').length>=Math.floor(TOTAL/2)},
    {n:'Complete',i:'💯',e:()=>S.ans.filter(a=>a!=='').length===TOTAL},
    {n:'Perfect 30',i:'🏆',e:()=>{for(let i=0;i<NUM_SEC;i++){const s=i*PER_SEC;const sec=S.ans.slice(s,s+PER_SEC);if(sec.every(a=>a!=='')&&sec.every((a,j)=>S.chk[s+j]&&a===Q[s+j].answer))return true}return false}},
    {n:'Ace (90%+)',i:'🎓',e:()=>{const a=S.ans.filter((_,i)=>S.chk[i]).length,c=S.ans.filter((a,i)=>S.chk[i]&&a===Q[i].answer).length;return a>=50&&c/a>=.9}},
    {n:'Note Taker',i:'📝',e:()=>S.notes.filter(n=>n!=='').length>=20},
    {n:'Organized',i:'🚩',e:()=>S.flag.filter(f=>f).length>=10}
  ];
  const bg=el('badges');
  if(bg){bg.innerHTML='';badges.forEach(b=>{
    const earned=b.e();
    bg.innerHTML+=`<div class="badge${earned?' earned':''}"><div class="badge-icon">${b.i}</div><div class="badge-name">${b.n}</div></div>`;
  })}
}

// ---- REVIEW ----
function doReview(){
  const mode=el('review-mode')?.value;
  const c=el('review-cards'); if(!c) return; c.innerHTML='';
  let list=[];
  if(mode==='incorrect') list=Q.map((q,i)=>({q,i})).filter(({q,i})=>S.chk[i]&&S.ans[i]!==q.answer);
  else if(mode==='flagged') list=Q.map((q,i)=>({q,i})).filter(({i})=>S.flag[i]);
  else if(mode==='low-confidence') list=Q.map((q,i)=>({q,i})).filter(({i})=>S.conf[i]==='low');
  if(!list.length){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">No questions match this review mode. Keep studying!</div>';return}
  list.forEach(({q,i})=>c.appendChild(makeCard(q,i)));
}

// ---- POPULATE CATEGORY FILTER ----
function populateCats(){
  const sel=el('f-cat'); if(!sel) return;
  [...new Set(Q.map(q=>q.category))].sort().forEach(c=>{
    const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);
  });
}

// ---- TIMER ----
function startTimer(){
  if(!S.t0) S.t0=Date.now()-S.elapsed*1000;
  el('timer')?.classList.remove('hidden');
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    S.elapsed=Math.floor((Date.now()-S.t0)/1000);
    const tv=el('timer-val');
    if(tv){const m=Math.floor(S.elapsed/60),s=S.elapsed%60;tv.textContent=m+':'+s.toString().padStart(2,'0')}
  },1000);
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  el('timer')?.classList.add('hidden');
}

// ---- EXPORT / IMPORT ----
function exportProgress(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ccma-quiz-progress-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
function importProgress(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);Object.assign(S,d);syncAliases();save();location.reload()}
      catch(err){alert('Invalid file. Please select a valid export file.')}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ---- PRINT ----
function printResults(){
  const cor=S.ans.filter((a,i)=>S.chk[i]&&a===Q[i].answer).length;
  const inc=S.ans.filter((a,i)=>S.chk[i]&&a!==Q[i].answer).length;
  const checked=S.chk.filter(c=>c).length;
  const acc=checked>0?Math.round(cor/checked*100):0;

  // Build print overlay
  let existing=document.getElementById('print-overlay');
  if(existing) existing.remove();

  const overlay=document.createElement('div');
  overlay.id='print-overlay';
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9999;overflow-y:auto;padding:32px;color:#111;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;line-height:1.6';

  let h=`<div style="max-width:800px;margin:0 auto">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px" class="no-print">
    <button onclick="document.getElementById('print-overlay').remove()" style="padding:10px 20px;border:2px solid #e2e8f0;border-radius:8px;background:#fff;font-size:14px;font-weight:600;cursor:pointer">← Back to Quiz</button>
    <button onclick="window.print()" style="padding:10px 20px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer">🖨️ Print / Save PDF</button>
  </div>`;

  h+=`<h1 style="font-size:22px;margin-bottom:4px">🏥 CCMA ${MOCK_LABEL} — Results Report</h1>`;
  h+=`<div style="color:#666;font-size:14px;margin-bottom:24px">Generated ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})} at ${new Date().toLocaleTimeString()}</div>`;

  h+=`<div style="display:flex;gap:24px;margin-bottom:32px;padding:20px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0">
    <div style="text-align:center;flex:1"><span style="font-size:28px;font-weight:800;display:block;color:#2563eb">${S.ans.filter(a=>a!=='').length}/${TOTAL}</span><span style="font-size:12px;color:#64748b">ANSWERED</span></div>
    <div style="text-align:center;flex:1"><span style="font-size:28px;font-weight:800;display:block;color:#059669">${cor}</span><span style="font-size:12px;color:#64748b">CORRECT</span></div>
    <div style="text-align:center;flex:1"><span style="font-size:28px;font-weight:800;display:block;color:#dc2626">${inc}</span><span style="font-size:12px;color:#64748b">INCORRECT</span></div>
    <div style="text-align:center;flex:1"><span style="font-size:28px;font-weight:800;display:block;color:#7c3aed">${acc}%</span><span style="font-size:12px;color:#64748b">ACCURACY</span></div>
  </div>`;

  // Category summary
  const cats={};
  Q.forEach((q,i)=>{
    if(!cats[q.category]) cats[q.category]={t:0,c:0,chk:0};
    cats[q.category].t++;
    if(S.chk[i]){cats[q.category].chk++;if(S.ans[i]===q.answer)cats[q.category].c++}
  });
  h+=`<h3 style="margin-bottom:12px">📊 Performance by Category</h3>`;
  Object.entries(cats).sort((a,b)=>b[1].t-a[1].t).forEach(([cat,s])=>{
    const pct=s.chk>0?Math.round(s.c/s.chk*100):0;
    h+=`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px"><span>${cat} (${s.t})</span><span><strong>${s.c}/${s.chk}</strong> correct${s.chk>0?' · '+pct+'%':''}</span></div>`;
  });

  // All questions
  h+=`<h3 style="margin-top:32px;margin-bottom:16px">📝 All Questions</h3>`;
  Q.forEach((q,i)=>{
    const answered=S.ans[i]!=='';
    const isCorrect=S.chk[i]&&S.ans[i]===q.answer;
    const isIncorrect=S.chk[i]&&S.ans[i]!==q.answer;
    const bg=isCorrect?'#f0fdf4':isIncorrect?'#fef2f2':'#f8fafc';
    const bdr=isCorrect?'4px solid #059669':isIncorrect?'4px solid #dc2626':'4px solid #94a3b8';

    h+=`<div style="padding:14px;margin-bottom:10px;border:1px solid #e2e8f0;border-left:${bdr};border-radius:8px;background:${bg};page-break-inside:avoid">`;
    h+=`<div style="font-size:11px;font-weight:700;color:#2563eb;margin-bottom:2px">Question ${q.num}</div>`;
    h+=`<div style="font-size:10px;color:#7c3aed;font-weight:600;margin-bottom:6px">${q.category}</div>`;
    h+=`<div style="font-size:14px;font-weight:500;margin-bottom:8px">${q.question}</div>`;

    if(!answered){
      h+=`<div style="font-size:13px;color:#94a3b8">Not answered</div>`;
    }else if(isCorrect){
      h+=`<div style="font-size:13px"><strong style="color:#059669">✓ Your answer: ${S.ans[i]}</strong></div>`;
    }else{
      h+=`<div style="font-size:13px"><strong style="color:#dc2626">✗ Your answer: ${S.ans[i]}</strong><br><strong style="color:#059669">Correct answer: ${q.answer}</strong></div>`;
    }
    if(S.notes[i]) h+=`<div style="font-size:12px;color:#64748b;margin-top:6px;padding-top:6px;border-top:1px solid #e2e8f0;font-style:italic">📝 ${S.notes[i]}</div>`;
    h+=`</div>`;
  });

  h+=`<div style="margin-top:32px;text-align:center;font-size:12px;color:#94a3b8">CCMA Mock Exam 2026 Study Platform</div>`;
  h+=`</div>`;

  overlay.innerHTML=h;
  document.body.appendChild(overlay);
}

// ---- EVENT DELEGATION ----
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');
  if(!t) return;
  const act=t.dataset.act, idx=parseInt(t.dataset.i);
  
  if(act==='flag'){S.flag[idx]=!S.flag[idx];save();render();updateDash()}
  if(act==='conf'){S.conf[idx]=t.dataset.lv;save();render()}
  if(act==='togglenote'){
    const area=el('note-'+idx);
    if(area) area.classList.toggle('hidden');
  }
});
document.addEventListener('change',e=>{
  const t=e.target.closest('[data-act]');
  if(!t) return;
  const act=t.dataset.act, idx=parseInt(t.dataset.i);
  
  if(act==='answer'){const _si=t.selectedIndex-1;const _v=_si>=0?Q[idx].options[_si]:'';S.ans[idx]=_v;if(S.mode==='study'&&_v!=='')S.chk[idx]=true;save();render();updateDash()}
  if(act==='note'){S.notes[idx]=t.value;save()}
});

// ---- INIT ----
document.addEventListener('DOMContentLoaded',()=>{
  load();
  populateCats();
  render();
  updateDash();

  // Dynamic header subtitle and exam navigation
  const _sub = el('hdr-subtitle');
  if(_sub) _sub.textContent = MOCK_LABEL;
  const _nav = el('exam-nav');
  if(_nav){
    const _links = [
      {label:'📋 Full Exam', href:'?'},
      {label:'📝 Mock 1 · Q1–90', href:'?mock=1'},
      {label:'📝 Mock 2 · Q91–180', href:'?mock=2'}
    ];
    const _active = _mock === '1' ? 1 : _mock === '2' ? 2 : 0;
    _nav.innerHTML = _links.map((l,i)=>`<a href="${l.href}" class="exam-nav-btn${i===_active?' active':''}">${l.label}</a>`).join('');
  }
  
  // Restore settings
  if(S.mode==='exam'){el('mode-study')?.classList.remove('active');el('mode-exam')?.classList.add('active')}
  
  // Load theme
  const theme=localStorage.getItem('ccma-theme')||'light';
  if(theme==='dark'){document.documentElement.setAttribute('data-theme','dark');el('theme-btn').textContent='☀️'}
  
  // Tabs
  el('tabs')?.addEventListener('click',e=>{
    const tab=e.target.closest('.tab');if(!tab) return;
    const name=tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    ['quiz','dashboard','review','settings'].forEach(t=>{
      const tc=el('tc-'+t);if(tc) tc.style.display=t===name?'block':'none';
    });
    if(name==='dashboard') updateDash();
  });
  // Init tab display
  ['dashboard','review','settings'].forEach(t=>{const tc=el('tc-'+t);if(tc) tc.style.display='none'});
  
  // Mode toggle
  el('mode-study')?.addEventListener('click',()=>{S.mode='study';syncAliases();el('mode-study').classList.add('active');el('mode-exam').classList.remove('active');save();render()});
  el('mode-exam')?.addEventListener('click',()=>{S.mode='exam';syncAliases();el('mode-exam').classList.add('active');el('mode-study').classList.remove('active');save();render()});
  
  // Theme
  el('theme-btn')?.addEventListener('click',()=>{
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
    localStorage.setItem('ccma-theme',isDark?'light':'dark');
    el('theme-btn').textContent=isDark?'🌙':'☀️';
  });
  
  // Filters
  el('f-status')?.addEventListener('change',renderCards);
  el('f-cat')?.addEventListener('change',renderCards);
  
  // Section nav
  el('btn-prev')?.addEventListener('click',()=>{if(S.sec>0){S.sec--;save();render();window.scrollTo({top:0,behavior:'smooth'})}});
  el('btn-next')?.addEventListener('click',()=>{
    if(S.sec<NUM_SEC-1){S.sec++;save();render();window.scrollTo({top:0,behavior:'smooth'})}
    else{
      // Finish quiz — check all and show dashboard
      S.chk.fill(true);save();render();updateDash();
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelector('[data-tab="dashboard"]')?.classList.add('active');
      ['quiz','review','settings'].forEach(t=>{const tc=el('tc-'+t);if(tc) tc.style.display='none'});
      el('tc-dashboard').style.display='block';
      window.scrollTo({top:0,behavior:'smooth'});
    }
  });
  
  // Check section
  el('btn-check')?.addEventListener('click',()=>{
    const start=S.sec*PER_SEC, end=(S.sec+1)*PER_SEC;
    const unanswered=S.ans.slice(start,end).filter(a=>a==='').length;
    if(unanswered>0&&!confirm(unanswered+' questions unanswered in this section. Check anyway?')) return;
    for(let i=start;i<end;i++) S.chk[i]=true;
    save();render();updateDash();
  });
  
  // Reset
  el('btn-reset')?.addEventListener('click',()=>{
    if(!confirm('Reset ALL progress? This cannot be undone.')) return;
    S.ans_study=Array(TOTAL).fill(''); S.chk_study=Array(TOTAL).fill(false);
    S.ans_exam=Array(TOTAL).fill('');  S.chk_exam=Array(TOTAL).fill(false);
    S.flag=Array(TOTAL).fill(false); S.notes=Array(TOTAL).fill(''); S.conf=Array(TOTAL).fill('');
    S.sec=0; S.t0=null; S.elapsed=0;
    syncAliases(); save(); location.reload();
  });
  
  // Review
  el('btn-review')?.addEventListener('click',doReview);
  
  // Settings buttons
  el('btn-export')?.addEventListener('click',exportProgress);
  el('btn-import')?.addEventListener('click',importProgress);
  el('btn-print')?.addEventListener('click',printResults);
  el('btn-clear')?.addEventListener('click',()=>{
    if(!confirm('Delete ALL saved data? This cannot be undone.')) return;
    localStorage.removeItem(MOCK_KEY);localStorage.removeItem('ccma-theme');location.reload();
  });
  
  // Settings toggles
  ['opt-confidence','opt-categories','opt-notes'].forEach(id=>{
    el(id)?.addEventListener('change',render);
  });
  el('opt-timer')?.addEventListener('change',e=>{
    if(e.target.checked) startTimer(); else stopTimer();
  });
  // Shuffle logic — shared by the quick button and settings checkbox
  function doShuffle(enable){
    if(enable){
      if(!confirm('Shuffle questions? Your current answers will be cleared.')) return false;
      const order=BASE_Q.map((_,i)=>i);
      for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}
      S.shuffled=true; S.shuffleOrder=order;
    } else {
      if(!confirm('Restore original order? Your current answers will be cleared.')) return false;
      S.shuffled=false; S.shuffleOrder=[];
    }
    S.ans_study=Array(TOTAL).fill(''); S.chk_study=Array(TOTAL).fill(false);
    S.ans_exam=Array(TOTAL).fill('');  S.chk_exam=Array(TOTAL).fill(false);
    S.flag=Array(TOTAL).fill(false); S.notes=Array(TOTAL).fill(''); S.conf=Array(TOTAL).fill('');
    S.sec=0; syncAliases(); save(); location.reload();
    return true;
  }
  el('btn-shuffle-quick')?.addEventListener('click',()=>doShuffle(!S.shuffled));
  el('opt-shuffle')?.addEventListener('change',e=>{ if(!doShuffle(e.target.checked)) e.target.checked=S.shuffled; });

  // Reflect shuffle state in UI on load
  if(el('opt-shuffle')) el('opt-shuffle').checked=S.shuffled;
  if(el('btn-shuffle-quick')) el('btn-shuffle-quick').classList.toggle('btn-primary',S.shuffled);
  if(S.shuffled&&el('shuffle-badge')) el('shuffle-badge').classList.remove('hidden');

  // Auto-save every 30s
  setInterval(save,30000);
  
  console.log('CCMA Mock Exam 2026 loaded: '+Q.length+' questions');
});
</script>
